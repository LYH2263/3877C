name: social_discovery_3877

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_discovery
    ports:
      - "38772:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_discovery"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/social_discovery?schema=public
      PORT: 38771
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: access-secret-change-me
      JWT_REFRESH_SECRET: refresh-secret-change-me
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      MEDIA_PUBLIC_PREFIX: http://localhost:38771
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
    ports:
      - "38771:38771"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      FRONTEND_PORT: 3000
      VITE_API_BASE_URL: http://localhost:38771/api
      VITE_MEDIA_BASE_URL: http://localhost:38771
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules:
